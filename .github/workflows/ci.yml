name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-elixir:
    name: Elixir tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: elixir-${{ hashFiles('mix.lock') }}

      - run: mix deps.get
      - run: mix test

  test-rust:
    name: Rust unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --lib

  test-e2e:
    name: E2E integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Elixir deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: elixir-${{ hashFiles('mix.lock') }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: cli-rust/target
          key: rust-${{ hashFiles('cli-rust/Cargo.lock') }}

      - name: Install Elixir deps
        run: mix deps.get

      - name: Start Phoenix server
        run: |
          mix phx.server &
          for i in $(seq 1 30); do
            curl -sf -o /dev/null -X POST http://localhost:4000/api/rooms && break
            sleep 1
          done

      - name: Run E2E tests
        working-directory: cli-rust
        run: COLLAB_TEST_SERVER=http://localhost:4000 cargo test --test e2e -- --nocapture

  # On green main: tag, build binaries, publish release — all in one workflow
  auto-release:
    name: Auto-release
    needs: [test-elixir, test-rust, test-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "$LATEST" ]; then
            echo "tag=v0.1.0" >> "$GITHUB_OUTPUT"
          else
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT_PATCH=$((PATCH + 1))
            echo "tag=${MAJOR}.${MINOR}.${NEXT_PATCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  build:
    name: Build (${{ matrix.binary }})
    needs: auto-release
    if: needs.auto-release.outputs.tag != ''
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: collabmd-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: collabmd-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: collabmd-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: collabmd-darwin-aarch64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: cli-rust

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-release.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        run: cp target/${{ matrix.target }}/release/collabmd ../${{ matrix.binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  publish-release:
    name: Publish release
    needs: [auto-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -name 'collabmd-*' -exec cp {} release/ \;
          chmod +x release/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-release.outputs.tag }}
          generate_release_notes: true
          files: release/*
