version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Rust (Cargo)
  - package-ecosystem: "cargo"
    directory: "/cli-rust"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"

  # Elixir (Hex)
  - package-ecosystem: "mix"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
